    <!-- Removed OneSignal Web Push (not used) -->
    <script>
      // Cleanup any previously registered OneSignal service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          regs.forEach((reg) => {
            const url = (reg.active && reg.active.scriptURL) || '';
            if (url.includes('OneSignalSDKWorker')) {
              reg.unregister().catch(() => {});
            }
          });
        });
      }

      // Handle chunk loading failures - auto-reload once if we get a syntax error
      window.addEventListener('error', function(event) {
        const isChunkError = event.message && (
          event.message.includes('Unexpected token') ||
          event.message.includes('Loading chunk') ||
          event.message.includes('Failed to fetch')
        );
        
        if (isChunkError) {
          const hasReloaded = sessionStorage.getItem('chunk-error-reload');
          
          if (!hasReloaded) {
            console.log('🔄 Detected chunk loading error, attempting reload...');
            sessionStorage.setItem('chunk-error-reload', 'true');
            
            // Clear caches before reload
            if ('caches' in window) {
              caches.keys().then(function(names) {
                names.forEach(function(name) {
                  caches.delete(name);
                });
              }).then(function() {
                window.location.reload(true);
              });
            } else {
              window.location.reload(true);
            }
          } else {
            // Already tried reloading, show user-friendly error
            console.error('❌ Chunk loading error persists after reload');
            document.body.innerHTML = `
              <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 100px auto; padding: 20px; text-align: center;">
                <h1 style="color: #e53e3e;">⚠️ Loading Error</h1>
                <p style="color: #4a5568; margin: 20px 0;">
                  We're having trouble loading the application. This usually happens when there's a cached version mismatch.
                </p>
                <p style="color: #4a5568; margin: 20px 0;">
                  <strong>Please try:</strong>
                </p>
                <ol style="text-align: left; color: #4a5568; margin: 20px auto; max-width: 400px;">
                  <li>Press <kbd>Ctrl+Shift+R</kbd> (Windows) or <kbd>Cmd+Shift+R</kbd> (Mac) to hard refresh</li>
                  <li>Clear your browser cache</li>
                  <li>Try an incognito/private window</li>
                </ol>
                <button onclick="sessionStorage.clear(); window.location.reload(true);" 
                  style="background: #3182ce; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 20px;">
                  Try Again
                </button>
              </div>
            `;
            sessionStorage.removeItem('chunk-error-reload');
          }
        }
      }, true);

      // Clear the reload flag on successful load
      window.addEventListener('load', function() {
        sessionStorage.removeItem('chunk-error-reload');
      });

      // Prevent all zoom behaviors with JavaScript
      document.addEventListener('gesturestart', function (e) {
        e.preventDefault();
      });

      document.addEventListener('gesturechange', function (e) {
        e.preventDefault();
      });

      document.addEventListener('gestureend', function (e) {
        e.preventDefault();
      });

      // Prevent triple-tap zoom
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function (event) {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, false);

      // Prevent double-tap zoom
      let lastTouchTime = 0;
      document.addEventListener('touchstart', function(event) {
        const now = Date.now();
        if (now - lastTouchTime <= 300) {
          event.preventDefault();
        }
        lastTouchTime = now;
      }, { passive: false });
    </script>
    
    <title>Career Opportunities | Arias Agencies</title>

    <!-- Apply saved theme before React mounts to prevent flash -->
    <script>
      try {
        var t = localStorage.getItem('atlasTheme') || 'light';
        document.body.setAttribute('data-theme', t);
        if (t === 'dark') document.documentElement.classList.add('dark');
      } catch(e) {}
    </script>

    <style>
      #app-shell-loader {
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: #f5f7fa;
      }
      [data-theme="dark"] #app-shell-loader {
        background: #1a1a1a;
      }
      #app-shell-loader .shell-spinner {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app-shell-loader .shell-spinner::after {
        content: '';
        width: 36px;
        height: 36px;
        border: 3px solid #d0d0d0;
        border-top-color: #00558c;
        border-radius: 50%;
        animation: shell-spin 0.7s linear infinite;
      }
      [data-theme="dark"] #app-shell-loader .shell-spinner::after {
        border-color: #333;
        border-top-color: #0077cc;
      }
      @keyframes shell-spin { to { transform: rotate(360deg); } }
    </style>
