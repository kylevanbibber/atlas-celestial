    <!-- Removed OneSignal Web Push (not used) -->
    <script>
      // Cleanup any previously registered OneSignal service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          regs.forEach((reg) => {
            const url = (reg.active && reg.active.scriptURL) || '';
            if (url.includes('OneSignalSDKWorker')) {
              reg.unregister().catch(() => {});
            }
          });
        });
      }

      // Prevent all zoom behaviors with JavaScript
      document.addEventListener('gesturestart', function (e) {
        e.preventDefault();
      });

      document.addEventListener('gesturechange', function (e) {
        e.preventDefault();
      });

      document.addEventListener('gestureend', function (e) {
        e.preventDefault();
      });

      // Prevent triple-tap zoom
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function (event) {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, false);

      // Prevent double-tap zoom
      let lastTouchTime = 0;
      document.addEventListener('touchstart', function(event) {
        const now = Date.now();
        if (now - lastTouchTime <= 300) {
          event.preventDefault();
        }
        lastTouchTime = now;
      }, { passive: false });
    </script>
